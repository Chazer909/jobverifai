<style>
  :root{
    --bg:#F4F9FB;
    --navy:#0A2540;
    --navy-2:#0E3352;
    --aqua:#12AEC4;
    --aqua-600:#0E97AB;
    --aqua-700:#0B7E90;
    --aqua-tint:#E7F6F9;
    --aqua-line:#BFE4EB;
    --chip:#EAF3F6;
    --field:#FBFDFE;
    --line:#DCE6EB;
    --ink:#3A4A57;
    --ink-strong:#0A2540;
    --muted:#5E7482;
    --muted-2:#8598A4;
    --warn-bg:#FCF3E1;
    --warn-line:#EBD3A6;
    --warn-ink:#8A5A10;
    --card-shadow:0 1px 3px rgba(10,37,64,0.07);
  }
  html,body{margin:0;padding:0;background:var(--bg);}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  button,textarea,input{font-family:inherit;}
  textarea::placeholder,input::placeholder{color:#a4b3bd;}
  a{color:inherit;}
  @keyframes jv-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes jv-pop{0%{opacity:0;transform:scale(0.9);}60%{transform:scale(1.03);}100%{opacity:1;transform:scale(1);}}
  @keyframes jv-dot{0%,80%,100%{opacity:.25;}40%{opacity:1;}}
  @keyframes jv-spin{to{transform:rotate(360deg);}}
  body{
    color:var(--ink);
    font-family:'Noto Sans Lao','Noto Sans Lao UI','Phetsarath OT','Saysettha OT',ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  }
  .wrap{min-height:100dvh;background:var(--bg);display:flex;flex-direction:column;align-items:center;padding:0 0 48px 0;}
  .inner{width:100%;max-width:560px;padding:22px 18px 0 18px;display:flex;flex-direction:column;gap:16px;}
  textarea,input[type=url],input[type=text]{outline:none;}
  textarea:focus,input[type=url]:focus,input[type=text]:focus{border-color:var(--aqua) !important;box-shadow:0 0 0 3px var(--aqua-tint);}
  .tap:active{transform:scale(0.98);}
  .tap-lg:active{transform:scale(0.99);}
  .spin{animation:jv-spin 0.9s linear infinite;}
  .grid2{display:grid;grid-template-columns:1fr;gap:12px;}
  @media (min-width:680px){
    .inner{max-width:640px;padding-top:30px;gap:18px;}
    .grid2{grid-template-columns:1fr 1fr;}
  }
  @media (min-width:1024px){ .inner{max-width:700px;} }
</style>

/* ================= URL-string heuristics ================= */
const SHORTENERS = ["bit.ly","tinyurl.com","t.co","is.gd","cutt.ly","shorturl.at","rebrand.ly","tiny.cc","ow.ly","buff.ly","s.id","lin.ee","goo.gl","rb.gy","shrtco.de"];
const RISKY_TLDS = ["xyz","top","club","live","work","click","link","buzz","icu","cyou","rest","gq","cf","tk","ml"];
const BRAND_WORDS = ["telegram","facebook","whatsapp","messenger","line"];
const REAL_BRAND_HOSTS = ["t.me","telegram.org","telegram.me","facebook.com","fb.com","whatsapp.com","messenger.com","line.me"];

function urlChecks(rawUrl) {
  let u;
  try { u = new URL(/^https?:\/\//i.test(rawUrl) ? rawUrl : "http://" + rawUrl); }
  catch (e) { return []; }
  const host = u.hostname.toLowerCase();
  const out = [];
  if (SHORTENERS.includes(host)) {
    out.push({ w: 1.5, name: { en: "Uses a link shortener", lo: "ໃຊ້ລິ້ງຫຍໍ້" },
      why: { en: "The real destination is hidden until you click -- shorteners are commonly used to bypass link-based warnings.", lo: "ປາຍທາງແທ້ຖືກເຊື່ອງໄວ້ຈົນກວ່າຈະກົດ — ລິ້ງຫຍໍ້ຖືກໃຊ້ຫຼາຍເພື່ອຫຼົບການເຕືອນຈາກລິ້ງ." } });
  }
  if (/^\d{1,3}(\.\d{1,3}){3}$/.test(host)) {
    out.push({ w: 2.5, name: { en: "Raw IP address instead of a domain", lo: "ໃຊ້ IP ແທນຊື່ໂດເມນ" },
      why: { en: "Legitimate employers use a named, registered domain -- a bare IP address in a link is a strong warning sign.", lo: "ນາຍຈ້າງທີ່ຖືກຕ້ອງໃຊ້ຊື່ໂດເມນທີ່ຈົດທະບຽນ — ເລກ IP ດ້ວນໆໃນລິ້ງແມ່ນສັນຍານເຕືອນທີ່ຮ້າຍແຮງ." } });
  }
  if (u.protocol === "http:") {
    out.push({ w: 1, name: { en: "Not a secure (https) connection", lo: "ບໍ່ແມ່ນການເຊື່ອມຕໍ່ທີ່ປອດໄພ (https)" },

  }

}

function runAnalysis(text, extraFlags) {
  extraFlags = extraFlags || [];
  const defs = checks();
  const ctx = {};
  const flags = extraFlags.slice();
  let score = 0;
  for (const f of extraFlags) score += f.w;
  for (const d of defs) {
    let m = null;
    try { m = d.find(text, ctx); } catch (e) { m = null; }
    if (m) {
      ctx[d.id] = true;
      const sn = (typeof m === "string") ? m.replace(/\s+/g, " ").trim() : "";
      flags.push({ name: d.name, why: d.why, snippet: sn.length > 70 ? sn.slice(0, 67) + "..." : sn, hasSnippet: sn.length > 0 });
      score += d.w;
    }
  }
  const hi = 6, med = 3;
  const level = score >= hi ? "HIGH" : score >= med ? "MEDIUM" : "LOW";
  const L2 = {
    HIGH: { name: { en: "High risk", lo: "ຄວາມສ່ຽງສູງ" }, color: "#C63B3B", bg: "#FBEAEA", border: "#F0C9C9",
      short: { en: "Matches scam patterns — don't pay, send documents, or travel before verifying.", lo: "ຄ້າຍຮູບແບບຫຼອກລວງ — ຢ່າຈ່າຍ, ຢ່າສົ່ງເອກະສານ, ຢ່າເດີນທາງ ກ່ອນກວດ." },
      expl: { en: "This offer matches several patterns used by trafficking and scam recruiters. Do not pay anything, send documents, or travel before verifying it independently.", lo: "ຂໍ້ສະເໜີນີ້ຄ້າຍກັບຮູບແບບການຫຼອກລວງແຮງງານ. ຢ່າຈ່າຍເງິນ, ຢ່າສົ່ງເອກະສານ, ຢ່າເດີນທາງ ກ່ອນກວດສອບໃຫ້ຊັດເຈນ." } },
    MEDIUM: { name: { en: "Medium risk", lo: "ຄວາມສ່ຽງປານກາງ" }, color: "#B9770F", bg: "#FBF1E0", border: "#EBD6AE",
      short: { en: "Some warning signs — verify the company and ask someone you trust first.", lo: "ມີສັນຍານເຕືອນ — ກວດສອບບໍລິສັດ ແລະ ປຶກສາຄົນທີ່ໄວ້ໃຈກ່ອນ." },
      expl: { en: "This offer has some warning signs. Verify the company independently and talk to someone you trust before replying.", lo: "ຂໍ້ສະເໜີນີ້ມີສັນຍານເຕືອນບາງຢ່າງ. ກວດສອບບໍລິສັດດ້ວຍຕົນເອງ ແລະ ປຶກສາຄົນທີ່ໄວ້ໃຈກ່ອນຕອບ." } },
    LOW: { name: { en: "Low risk", lo: "ຄວາມສ່ຽງຕໍ່າ" }, color: "#0E9E86", bg: "#E5F6F1", border: "#BEE6DC",
      short: { en: "No common scam patterns — but always verify anyway.", lo: "ບໍ່ພົບຮູບແບບຫຼອກລວງທົ່ວໄປ — ແຕ່ຄວນກວດສອບສະເໝີ." },
      expl: { en: "No common recruitment-scam patterns were detected. A low score is not a guarantee -- always verify a company before you commit or travel.", lo: "ບໍ່ພົບຮູບແບບການຫຼອກລວງທີ່ພົບເລື້ອຍ. ແຕ່ຄະແນນຕໍ່າບໍ່ແມ່ນການຮັບປະກັນ — ຄວນກວດສອບບໍລິສັດສະເໝີກ່ອນຕົກລົງ ຫຼື ເດີນທາງ." } }
  }[level];
  return Object.assign({ level: level, flags: flags, total: defs.length + extraFlags.length, score: score }, L2);
}

  try {

function pickRecorderMime() {
  const candidates = ["audio/webm;codecs=opus", "audio/webm", "audio/mp4", "audio/ogg"];
  for (const c of candidates) { if (window.MediaRecorder && MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(c)) return c; }
  return "";
}
async function onStartRecording() {
  if (state.voiceRecording) return;
  state.voiceError = "";
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) { state.voiceError = "voiceUnsupported"; render(); return; }
  try { mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch (e) { state.voiceError = "voiceMic"; render(); return; }
  const mime = pickRecorderMime(); const chunks = [];
  try { mediaRecorder = mime ? new MediaRecorder(mediaStream, { mimeType: mime }) : new MediaRecorder(mediaStream); }
  catch (e) { mediaRecorder = new MediaRecorder(mediaStream); }
  mediaRecorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
  mediaRecorder.onstop = () => {
    const blob = new Blob(chunks, { type: mediaRecorder.mimeType || "audio/webm" });
    if (state.voiceBlobUrl) URL.revokeObjectURL(state.voiceBlobUrl);
    state.voiceBlob = blob; state.voiceBlobUrl = URL.createObjectURL(blob); state.voiceKind = "audio"; state.voiceRecording = false;
    if (mediaStream) { mediaStream.getTracks().forEach((tr) => tr.stop()); mediaStream = null; }
    render();
  };
  state.voiceRecording = true; state.voiceSeconds = 0; state.voiceText = ""; state.voiceError = ""; render();
  mediaRecorder.start();
  recordTimer = setInterval(() => { state.voiceSeconds += 1; if (state.voiceSeconds >= VOICE_MAX_SECONDS) onStopRecording(); else render(); }, 1000);
}
function onStopRecording() { clearInterval(recordTimer); recordTimer = null; if (mediaRecorder && mediaRecorder.state !== "inactive") mediaRecorder.stop(); else state.voiceRecording = false; }
function onVoiceFileSelected(file) {
  if (!file) return;
  if (state.voiceBlobUrl) URL.revokeObjectURL(state.voiceBlobUrl);

  state.voiceKind = file.type && file.type.startsWith("video") ? "video" : "audio";
  state.voiceText = ""; state.voiceError = ""; render();

function onDiscardVoice() {
  if (state.voiceBlobUrl) URL.revokeObjectURL(state.voiceBlobUrl);

  state.voiceTranscribing = true; state.voiceError = ""; render();

function voiceCard(v, i) {
  const nm = v.seed ? L(v.name) : (v.name || L(D.voicesAnon));
  const bd = v.seed ? L(v.body) : v.body;
  const initial = (nm && nm.trim()) ? nm.trim().charAt(0).toUpperCase() : "•";
  const palette = [["#E7F6F9","#0B7E90"],["#EAF3F6","#0E3352"],["#E5F6F1","#0E9E86"]];
  const pc = palette[i % palette.length];
  return '<div style="position:relative;background:#fff;border:1px solid var(--line);border-radius:16px;padding:15px 15px 14px 15px;box-shadow:var(--card-shadow);overflow:hidden;">'
    + '<div aria-hidden="true" style="position:absolute;top:2px;right:12px;font-size:52px;line-height:1;color:' + pc[0] + ';font-family:Georgia,serif;">”</div>'
    + '<div style="position:relative;display:flex;align-items:center;gap:9px;margin-bottom:8px;">'
    + '<div style="width:30px;height:30px;border-radius:50%;background:' + pc[0] + ';color:' + pc[1] + ';display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex:none;">' + esc(initial) + "</div>"
    + '<div style="font-size:12.5px;font-weight:700;color:' + pc[1] + ';">' + esc(nm) + "</div></div>"
    + '<div style="position:relative;font-size:13.5px;line-height:1.65;color:var(--ink-strong);">' + esc(bd) + "</div>"
    + "</div>";
}

function sponsorStrip() {
  var label = state.lang === "lo" ? "ໄດ້ຮັບການສະໜັບສະໜູນຈາກ · LAO HACKATHON 2026" : "Supported by · LAO HACKATHON 2026";
  return '<div style="margin-top:14px;border-top:1px solid var(--line);padding-top:14px;display:flex;flex-direction:column;align-items:center;gap:9px;">'
    + '<div style="font-size:10.5px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;color:var(--muted-2);">' + esc(label) + '</div>'
    + '<div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:14px 20px;background:#ffffff;border:1px solid var(--line);border-radius:14px;padding:12px 16px;max-width:100%;">'
    + SPONSOR_LOGOS.map(function(l){ return '<img src="' + l.s + '" alt="' + esc(l.a) + '" title="' + esc(l.a) + '" loading="lazy" decoding="async" style="height:32px;width:auto;object-fit:contain;display:block;">'; }).join('')
    + '</div></div>';
}

  html += '<header style="display:flex;align-items:center;gap:12px;">'

        + '<div style="font-size:13px;line-height:1.6;color:rgba(255,255,255,0.85);">' + esc(L(D.tellBody)) + "</div>"
        + '<button id="btnShare" class="tap-lg" style="width:100%;min-height:52px;border:none;border-radius:13px;background:#fff;color:var(--navy);font-size:15.5px;font-weight:700;cursor:pointer;">' + esc(L(D.shareContact)) + "</button>"
        + '<button id="btnCopy" class="tap-lg" style="width:100%;min-height:46px;border:1.5px solid rgba(255,255,255,0.4);border-radius:13px;background:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;">' + (state.copied ? esc(L(D.copied)) : esc(L(D.copyMessage))) + "</button>"
        + "</div></div>";
    }
  }

  if (state.section === "practice") { html += callBar(); html += renderPractice(); }
  if (state.section === "learn") { html += renderLearn(); }

  // footer
  html += '<footer style="display:flex;flex-direction:column;gap:10px;margin-top:10px;">'
    + '<button id="btnQr" class="tap-lg" style="width:100%;min-height:48px;border:1.5px solid var(--line);border-radius:14px;background:#fff;color:var(--ink);font-size:14px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:9px;">'
    + '<svg width="16" height="16" viewBox="0 0 16 16" aria-hidden="true"><rect x="0" y="0" width="6" height="6" fill="#0A2540"></rect><rect x="10" y="0" width="6" height="6" fill="#0A2540"></rect><rect x="0" y="10" width="6" height="6" fill="#0A2540"></rect><rect x="10" y="10" width="3" height="3" fill="#0A2540"></rect><rect x="13" y="13" width="3" height="3" fill="#0A2540"></rect></svg>'
    + "<span>" + esc(L(D.shareTool)) + "</span></button>"
    + '<div style="font-size:11.5px;color:var(--muted-2);text-align:center;line-height:1.6;padding:0 10px;">' + esc(L(D.disclaimer)) + "</div>"
    + sponsorStrip()
    + "</footer>";

  html += "</div></div>";

  if (state.qrOpen) {
    html += '<div id="qrModal" style="position:fixed;inset:0;background:rgba(10,37,64,0.55);display:flex;align-items:center;justify-content:center;z-index:60;padding:20px;">'
      + '<div id="qrCard" style="background:#fff;border-radius:20px;padding:22px;width:100%;max-width:320px;display:flex;flex-direction:column;gap:13px;align-items:center;animation:jv-in 0.25s ease;">'
      + '<div style="font-size:16px;font-weight:700;text-align:center;color:var(--ink-strong);">' + esc(L(D.qrTitle)) + "</div>"
      + '<div style="font-size:13px;color:var(--muted);text-align:center;margin-top:-8px;">' + esc(L(D.qrSub)) + "</div>"
      + '<div id="qrCanvas" style="width:212px;height:212px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--ink);word-break:break-all;text-align:center;"></div>'
      + '<div style="font-size:11px;color:var(--muted-2);word-break:break-all;text-align:center;font-family:ui-monospace,Menlo,Consolas,monospace;max-width:100%;">' + esc(window.location.href) + "</div>"
      + '<button id="btnQrClose" class="tap" style="width:100%;min-height:46px;border:none;border-radius:12px;background:var(--chip);color:var(--ink-strong);font-size:14.5px;font-weight:700;cursor:pointer;">' + esc(L(D.close)) + "</button>"
      + "</div></div>";
  }

  app.innerHTML = html;
  document.documentElement.lang = state.lang;
  bind();
}

function bind() {
  const $ = (id) => document.getElementById(id);
  document.querySelectorAll("[data-mode]").forEach((btn) => btn.addEventListener("click", () => { state.mode = btn.getAttribute("data-mode"); render(); }));
  document.querySelectorAll("[data-lang]").forEach((btn) => btn.addEventListener("click", () => { state.lang = btn.getAttribute("data-lang"); render(); }));
  document.querySelectorAll("[data-section]").forEach((btn) => btn.addEventListener("click", () => { state.section = btn.getAttribute("data-section"); state.learnView = "main"; state.voiceJustShared = false; render(); window.scrollTo(0, 0); }));
  document.querySelectorAll("[data-goto]").forEach((btn) => btn.addEventListener("click", () => { state.section = btn.getAttribute("data-goto"); render(); window.scrollTo(0, 0); }));
  document.querySelectorAll("[data-pchoice]").forEach((btn) => btn.addEventListener("click", () => onPracticeChoose(parseInt(btn.getAttribute("data-pchoice"), 10))));

  if ($("btnHelp")) $("btnHelp").addEventListener("click", () => { state.helpOpen = !state.helpOpen; render(); });
  if ($("btnPracticeStart")) $("btnPracticeStart").addEventListener("click", onPracticeStart);
  if ($("btnPracticeRestart")) $("btnPracticeRestart").addEventListener("click", onPracticeRestart);
  if ($("btnPracticeGoChecker")) $("btnPracticeGoChecker").addEventListener("click", onPracticeGoToChecker);

  const offerText = $("offerText");
  if (offerText) { offerText.addEventListener("input", (e) => { state.text = e.target.value; syncTextButton(); }); offerText.focus(); offerText.setSelectionRange(offerText.value.length, offerText.value.length); }
  if ($("btnExample")) $("btnExample").addEventListener("click", () => { state.text = example(); render(); });
  if ($("btnClear")) $("btnClear").addEventListener("click", () => { state.text = ""; render(); });
  if ($("btnAnalyze")) $("btnAnalyze").addEventListener("click", onAnalyzeText);

  if ($("imgFileInput")) $("imgFileInput").addEventListener("change", (e) => onImageSelected(e.target.files[0]));
  if ($("btnExtract")) $("btnExtract").addEventListener("click", onExtractFromImage);
  if ($("ocrTextArea")) $("ocrTextArea").addEventListener("input", (e) => { state.imgOcrText = e.target.value; });
  if ($("btnAnalyzeImg")) $("btnAnalyzeImg").addEventListener("click", onAnalyzeImageText);

  const linkInput = $("linkInput");
  if (linkInput) { linkInput.addEventListener("input", (e) => { state.linkUrl = e.target.value; syncLinkButton(); }); linkInput.focus(); linkInput.setSelectionRange(linkInput.value.length, linkInput.value.length); }
  if ($("btnExampleLink")) $("btnExampleLink").addEventListener("click", () => { state.linkUrl = exampleLink(); render(); });
  if ($("btnExampleTikTok")) $("btnExampleTikTok").addEventListener("click", () => { state.linkUrl = exampleTikTok(); render(); });
  if ($("btnCheckLink")) $("btnCheckLink").addEventListener("click", onCheckLink);

  if ($("btnRecord")) $("btnRecord").addEventListener("click", onStartRecording);
  if ($("btnStopRecord")) $("btnStopRecord").addEventListener("click", onStopRecording);
  if ($("voiceFileInput")) $("voiceFileInput").addEventListener("change", (e) => onVoiceFileSelected(e.target.files[0]));
  if ($("btnDiscardVoice")) $("btnDiscardVoice").addEventListener("click", onDiscardVoice);
  if ($("btnTranscribe")) $("btnTranscribe").addEventListener("click", onTranscribeVoice);
  if ($("voiceTextArea")) $("voiceTextArea").addEventListener("input", (e) => { state.voiceText = e.target.value; });
  if ($("btnAnalyzeVoice")) $("btnAnalyzeVoice").addEventListener("click", onAnalyzeVoiceText);

  if ($("btnBack")) $("btnBack").addEventListener("click", () => { state.screen = "input"; state.result = null; render(); });
  if ($("btnDetails")) $("btnDetails").addEventListener("click", () => { state.screen = "detail"; render(); window.scrollTo(0, 0); });
  if ($("btnShareQuick")) $("btnShareQuick").addEventListener("click", onShare);
  if ($("btnBackResult")) $("btnBackResult").addEventListener("click", () => { state.screen = "result"; render(); window.scrollTo(0, 0); });
  if ($("btnShare")) $("btnShare").addEventListener("click", onShare);
  if ($("btnCopy")) $("btnCopy").addEventListener("click", doCopy);

  if ($("voiceName")) $("voiceName").addEventListener("input", (e) => { state.voiceForm.name = e.target.value; });
  if ($("voiceBody")) $("voiceBody").addEventListener("input", (e) => { state.voiceForm.body = e.target.value; });
  if ($("btnSubmitVoice")) $("btnSubmitVoice").addEventListener("click", onSubmitVoice);
  if ($("btnVoicesViewAll")) $("btnVoicesViewAll").addEventListener("click", () => { state.learnView = "wall"; state.voiceJustShared = false; render(); window.scrollTo(0, 0); });
  if ($("btnVoicesBack")) $("btnVoicesBack").addEventListener("click", () => { state.learnView = "main"; render(); window.scrollTo(0, 0); });

  if ($("btnQr")) $("btnQr").addEventListener("click", () => { state.qrOpen = true; render(); });
  if ($("btnQrClose")) $("btnQrClose").addEventListener("click", () => { state.qrOpen = false; render(); });
  if ($("qrModal")) $("qrModal").addEventListener("click", () => { state.qrOpen = false; render(); });
  if ($("qrCard")) $("qrCard").addEventListener("click", (e) => e.stopPropagation());
  if ($("qrCanvas")) drawQr($("qrCanvas"));
}

function syncTextButton() { const btn = document.getElementById("btnAnalyze"); const empty = !state.text.trim(); if (btn) { btn.disabled = empty || state.analyzing; btn.style.opacity = (empty || state.analyzing) ? 0.45 : 1; } }
function syncLinkButton() { const btn = document.getElementById("btnCheckLink"); const empty = !state.linkUrl.trim(); if (btn) { btn.disabled = empty || state.linkFetching; btn.style.opacity = (empty || state.linkFetching) ? 0.45 : 1; } }

render();
</script>
</body>
</html>
